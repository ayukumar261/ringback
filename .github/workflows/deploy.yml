name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Next.js application image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/ayukumar261/ringback-web:latest
            ghcr.io/ayukumar261/ringback-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on DigitalOcean Droplet
        env:
          RINGBACK_HOOK_SECRET: ${{ secrets.RINGBACK_HOOK_SECRET }}
          RINGBACK_HOOK_URL: ${{ secrets.RINGBACK_HOOK_URL }}
        run: |
          BODY="{\"ref\":\"${GITHUB_REF}\",\"sha\":\"${GITHUB_SHA}\"}"
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$RINGBACK_HOOK_SECRET" | awk '{print $2}')
          curl -fsS -X POST "$RINGBACK_HOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$BODY"
